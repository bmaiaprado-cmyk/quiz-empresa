<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clude Saúde - Quiz Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        /* Identidade Visual Clude: #8031a7 */
        .bg-clude { background-color: #8031a7; }
        .text-clude { color: #8031a7; }
        .border-clude { border-color: #8031a7; }
        
        .selected-purple { 
            border-color: #8031a7 !important; 
            background-color: #f3ebf6 !important; 
            color: #8031a7 !important;
            box-shadow: 0 0 0 2px #8031a7;
        }
        
        .correct { background-color: #d1fae5; border-color: #10b981; color: #065f46; }
        .wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }
        
        input:focus { border-color: #8031a7 !important; ring: 2px #8031a7; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div id="main-card" class="bg-white p-6 md:p-10 rounded-3xl shadow-2xl w-full max-w-lg border-t-[10px] border-clude">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-clude tracking-tighter">Clude Saúde</h1>
            <div class="h-1 w-12 bg-purple-200 mx-auto mt-2 rounded-full"></div>
        </div>

        <div id="step-registration">
            <h2 class="text-xl font-bold text-gray-800 mb-2 text-center">Participe e concorra!</h2>
            <p class="text-gray-500 mb-8 text-center text-sm">Preencha os dados abaixo para iniciar o quiz.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Seu nome" class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1 ml-1">WhatsApp</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000" class="w-full p-4 border-2 border-gray-100 rounded-2xl outline-none transition-all">
                </div>

                <input type="text" id="email_confirm" style="display:none !important" tabindex="-1" autocomplete="off">
                
                <p class="font-bold text-gray-700 mt-6 text-center text-sm">Selecione uma área para o quiz:</p>
                <div class="grid grid-cols-3 gap-3">
                    <button type="button" onclick="selectArea(this, 'Saúde')" class="area-btn border-2 border-gray-100 p-4 rounded-2xl text-xs font-black text-gray-400 hover:bg-purple-50 transition-all uppercase">Saúde</button>
                    <button type="button" onclick="selectArea(this, 'Corpo')" class="area-btn border-2 border-gray-100 p-4 rounded-2xl text-xs font-black text-gray-400 hover:bg-purple-50 transition-all uppercase">Corpo</button>
                    <button type="button" onclick="selectArea(this, 'Mente')" class="area-btn border-2 border-gray-100 p-4 rounded-2xl text-xs font-black text-gray-400 hover:bg-purple-50 transition-all uppercase">Mente</button>
                </div>

                <button onclick="startQuiz()" class="w-full bg-clude text-white py-5 rounded-2xl font-black mt-8 shadow-xl shadow-purple-200 hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest">Iniciar Quiz</button>
            </div>
        </div>

        <div id="step-quiz" class="hidden">
            <div id="question-box">
                <div class="flex justify-between items-center mb-6">
                    <span id="question-number" class="text-[10px] font-black text-clude uppercase tracking-tighter bg-purple-100 px-3 py-1 rounded-full">Pergunta 1 de 5</span>
                    <span id="current-score" class="text-[10px] font-bold text-gray-300 uppercase">Pontos: 0</span>
                </div>
                <h2 id="question-text" class="text-xl font-bold text-gray-800 mb-8 leading-tight">...</h2>
                <div id="options-container" class="space-y-3"></div>
                
                <div id="feedback" class="mt-8 p-5 rounded-2xl hidden text-sm font-medium leading-relaxed border-l-8"></div>
                
                <button id="next-btn" onclick="nextQuestion()" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-black mt-8 hidden shadow-lg uppercase tracking-widest transition-all">Próxima Pergunta</button>
            </div>
        </div>

        <div id="step-finish" class="hidden text-center">
            <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-6 text-clude">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-gray-800 mb-4">Quiz Concluído!</h2>
            <div id="result-message" class="text-gray-600 bg-gray-50 p-6 rounded-3xl text-left text-sm leading-relaxed mb-8 italic border-l-4 border-clude shadow-inner"></div>
            <p class="text-clude font-black mb-8 uppercase tracking-tighter text-sm">✅ Participação confirmada no sorteio!</p>
            <button onclick="location.reload()" class="text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-clude transition-all">Refazer teste</button>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÕES DO USUÁRIO (Obrigatório preencher) ---

        const AUTH_TOKEN = 'Clude2026!Quiz#Alpha';

                    { q: "Como você cuida da sua saúde mental?", options: ["Não cuido muito", "Tento controlar o estresse com pausas", "Dou atenção emocional e busco ajuda profissional"], weights: [1, 2, 3], explanation: "Saúde mental e física caminham juntas!" },
                    { q: "Você costuma procurar informações confiáveis quando sente algo?", options: ["Jogo no Google e vou no primeiro", "Tento achar fontes confiáveis... mas tenho dúvida", "Procuro orientação de profissionais ou plataformas seguras"], weights: [1, 2, 3], explanation: "A Clude Saúde oferece canais seguros para tirar suas dúvidas." },

                    if (p <= 7) return "5 a 7 pontos – Cuidados em segundo plano: Hora de priorizar você! Na Clude Saúde, você encontra o apoio que precisa.";

                }

                    { q: "A recomendação de vegetais é de 4 a 5 porções diárias?", options: ["Verdadeiro", "Falso"], correct: 0, explanation: "Verdadeiro! Recomenda-se cerca de 400g de vegetais por dia." },
                    { q: "Ultraprocessados aumentam risco de doenças crônicas?", options: ["Verdadeiro", "Falso"], correct: 0, explanation: "Verdadeiro! Eles aumentam processos inflamatórios no corpo." }

                    if (p <= 3) return "0 a 3 pontos – Sinal de alerta: Hora de virar o jogo! Com a Clude Saúde, você tem nutricionistas e personal trainers.";
                    if (p <= 5) return "4 a 5 pontos – Está no caminho certo, mas pode ir além! Use o chat para tirar dúvidas com especialistas.";

            },

                    { q: "Com que frequência come apenas por ansiedade ou tédio?", options: ["Todos os dias", "Frequentemente", "Às vezes", "Raramente ou nunca"], weights: [0, 1, 2, 3], explanation: "Identificar a fome emocional é o primeiro passo para o controle." },
                    { q: "Com que frequência consome frutas?", options: ["Raramente", "1 vez por semana", "2 a 4 vezes", "Todos os dias"], weights: [0, 1, 2, 3], explanation: "As frutas fornecem fibras essenciais para o cérebro e corpo." },
                    { q: "Qual o seu volume de água diário?", options: ["Até 50
